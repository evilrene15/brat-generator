<!-- Initialize App -->
<script>
    var textInput = document.getElementById('textInput');
    var textOverlay = document.getElementById('textOverlay');

    function getMaxFontSize() {
        var w = window.innerWidth;
        if (w <= 480) return 80;
        if (w <= 768) return 110;
        if (w <= 1024) return 140;
        return 170;
    }

    function fitText() {
        var text = textInput.value;
        textOverlay.innerText = text;
        textFit(textOverlay, { maxFontSize: getMaxFontSize() });
    }

    textInput.addEventListener('input', fitText);

    var resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitText, 150);
    });

    window.onload = fitText;
</script>
