<!-- Initialize App -->
<script>
    var textInput = document.getElementById('textInput');
    var textOverlay = document.getElementById('textOverlay');
    var btnDownload = document.getElementById('btnDownload');

    function fitText() {
        var text = textInput.value;
        textOverlay.innerText = text;
        textFit(textOverlay, { maxFontSize: 260 });
    }

    textInput.addEventListener('input', fitText);

    var resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitText, 150);
    });

    window.onload = fitText;

    // Export system using Canvas 2D API with DOM line detection to ensure 100% layout and typography sync
    function exportSticker() {
        btnDownload.innerText = "Downloading...";
        btnDownload.disabled = true;

        try {
            const memeContainer = document.getElementById('memeContainer');
            const textOverlay = document.getElementById('textOverlay');
            const span = document.querySelector('#textOverlay span.textFitted');
            if (!memeContainer || !textOverlay || !span) return;

            // 1. Wrap each word in a span to get its exact browser-rendered layout position
            const paragraphs = span.innerText.split('\n');
            const originalHTML = span.innerHTML;
            
            let spanHTML = '';
            paragraphs.forEach((p, pIdx) => {
                const pWords = p.split(' ');
                const pSpans = pWords.map(w => `<span>${w}</span>`).join(' ');
                spanHTML += `<span class="paragraph-wrap">${pSpans}</span>`;
                if (pIdx < paragraphs.length - 1) {
                    spanHTML += '<br/>';
                }
            });
            span.innerHTML = spanHTML;

            const childSpans = span.querySelectorAll('.paragraph-wrap span');

            // 2. Calculate coordinates and scale factor (from screen to 2048x2048)
            const previewWidth = memeContainer.offsetWidth;
            const scale = 2048 / previewWidth;

            const containerRect = memeContainer.getBoundingClientRect();
            const overlayStyle = window.getComputedStyle(textOverlay);
            const computedStyle = window.getComputedStyle(span);

            const fontSize = parseFloat(computedStyle.fontSize);
            const fontWeight = computedStyle.fontWeight || '500';
            const fontStyle = computedStyle.fontStyle || 'normal';
            const letterSpacing = computedStyle.letterSpacing;
            
            const canvasFontSize = fontSize * scale;

            const bgColor = window.getComputedStyle(memeContainer).backgroundColor || '#ffffff';
            const textColor = overlayStyle.color || '#000000';

            // Scale the CSS blur filter
            const filterText = computedStyle.filter;
            let canvasFilter = 'none';
            if (filterText && filterText !== 'none') {
                canvasFilter = filterText.replace(/blur\(([\d.]+)px\)/g, (match, p1) => {
                    return `blur(${parseFloat(p1) * scale}px)`;
                });
            }

            // 3. Extract word positions directly from the browser layout engine
            const wordsData = [];
            childSpans.forEach(child => {
                const wordText = child.innerText;
                if (!wordText) return;
                
                const childRect = child.getBoundingClientRect();
                const relativeX = childRect.left - containerRect.left;
                const relativeY = childRect.top - containerRect.top;
                
                wordsData.push({
                    text: wordText,
                    x: relativeX * scale,
                    y: relativeY * scale
                });
            });

            // Restore screen preview DOM immediately after reading positions
            span.innerHTML = originalHTML;

            // 4. Draw on the output canvas
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 2048;
            const ctx = canvas.getContext('2d');

            // Draw solid background
            ctx.filter = 'none';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, 2048, 2048);

            // Configure text styles
            ctx.fillStyle = textColor;
            ctx.font = `${fontStyle} ${fontWeight} ${canvasFontSize}px arial_narrowregular, "Arial Narrow", sans-serif`;
            ctx.textBaseline = 'top';
            
            const parsedLetterSpacing = parseFloat(letterSpacing);
            if (!isNaN(parsedLetterSpacing) && parsedLetterSpacing !== 0) {
                ctx.letterSpacing = `${parsedLetterSpacing * scale}px`;
            }

            // Apply canvas filter safely
            try {
                ctx.filter = canvasFilter;
            } catch (e) {
                console.warn("Canvas filter not supported on this browser:", e);
            }

            // Draw each word at its exact relative viewport coordinates (copied from preview)
            wordsData.forEach(word => {
                ctx.fillText(word.text, word.x, word.y);
            });

            // Reset canvas filter
            ctx.filter = 'none';

            // 5. Download Trigger via Synchronous Blob URL (avoids string length limits & memory issues of Data URLs)
            const pngUrl = canvas.toDataURL('image/png', 1.0);
            
            // Convert to Blob synchronously
            const base64Data = pngUrl.split(',')[1];
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'image/png' });
            
            // Create Blob URL
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = 'ziyad_studio_sticker.png';
            link.href = blobUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Revoke after download is triggered
            setTimeout(() => {
                URL.revokeObjectURL(blobUrl);
            }, 100);

        } catch (err) {
            console.error("Proses ekspor gagal:", err);
            alert("Terjadi kesalahan saat mengekspor gambar stiker.");
        } finally {
            btnDownload.innerText = "Download PNG (2048x2048)";
            btnDownload.disabled = false;
        }
    }

    btnDownload.addEventListener('click', exportSticker);
</script>
